services:
  postgres-test:
    image: postgres:16-alpine
    container_name: way-education-postgres-test
    environment:
      POSTGRES_DB: way_education_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d way_education_test"]
      interval: 5s
      timeout: 5s
      retries: 5
